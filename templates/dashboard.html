{% extends "base.html" %}

{% block page_title %}Dashboard Overview{% endblock %}

{% block content %}
<!-- KPI Cards -->
<section class="kpi-grid">
    <div class="card kpi-card">
        <div class="kpi-icon blue-bg">👥</div>
        <div class="kpi-info">
            <h3>Total Students</h3>
            <p id="total-students" class="kpi-value">--</p>
        </div>
    </div>
    <div class="card kpi-card">
        <div class="kpi-icon green-bg">📅</div>
        <div class="kpi-info">
            <h3>Overall Attendance</h3>
            <p id="overall-attendance" class="kpi-value">--%</p>
        </div>
    </div>
    <div class="card kpi-card">
        <div class="kpi-icon indigo-bg">📈</div>
        <div class="kpi-info">
            <h3>Average CGPA</h3>
            <p id="average-gpa" class="kpi-value">--</p>
        </div>
    </div>
</section>

<!-- Charts Section -->
<section class="charts-grid">
    <div class="card chart-container">
        <div class="card-header">
            <h3>Student Status Distribution</h3>
        </div>
        <div class="canvas-wrapper">
            <canvas id="performanceChart"></canvas>
        </div>
    </div>
    <div class="card chart-container">
        <div class="card-header">
            <h3>Top Students Attendance</h3>
        </div>
        <div class="canvas-wrapper">
            <canvas id="attendanceChart"></canvas>
        </div>
    </div>
</section>
{% endblock %}
